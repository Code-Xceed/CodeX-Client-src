name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace --warning-mode all

      - name: Run checks
        run: ./gradlew check --stacktrace --warning-mode all

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: codex-build-artifacts
          path: |
            build/libs/*.jar
            build/reports/**/*
